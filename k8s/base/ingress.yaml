# k8s/base/ingress.yaml
# NGINX Ingress controller rules.
# Assumes nginx ingress-controller is installed in the cluster
# (e.g., via Helm: helm install ingress-nginx ingress-nginx/ingress-nginx).
#
# Traffic routing:
#   /api/*    → api:80
#   /ws/*     → api:80  (WebSocket chat endpoint)
#   /*        → frontend:80
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentic-erp-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    - host: "erp.131-189-252-158.nip.io"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /openapi.json
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
