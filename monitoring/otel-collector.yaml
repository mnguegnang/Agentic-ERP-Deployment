# monitoring/otel-collector.yaml
# OpenTelemetry Collector — deployed as a DaemonSet in the AKS cluster.
# Receives OTLP traces/metrics from FastAPI (port 4317) and forwards
# to Azure Monitor Application Insights.
# Blueprint Section 7.5.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512
      memory_limiter:
        check_interval: 5s
        limit_percentage: 75
        spike_limit_percentage: 25

    exporters:
      # Azure Monitor Application Insights
      azuremonitor:
        connection_string: "${APPINSIGHTS_CONNECTION_STRING}"
      # Local logging for debugging (verbose in dev, disabled in prod)
      logging:
        verbosity: normal

    service:
      telemetry:
        logs:
          level: "warn"
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [azuremonitor, logging]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [azuremonitor]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [azuremonitor]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.115.1
          args:
            - "--config=/etc/otel/config.yaml"
          ports:
            - containerPort: 4317    # OTLP gRPC
              name: otlp-grpc
              protocol: TCP
            - containerPort: 4318    # OTLP HTTP
              name: otlp-http
              protocol: TCP
          envFrom:
            - secretRef:
                name: otel-secrets    # contains APPINSIGHTS_CONNECTION_STRING
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
