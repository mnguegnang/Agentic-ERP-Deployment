# Agentic-ERP-Deploy — Deploy to Azure
# Triggered automatically by Project 1 CI (repository_dispatch) or manually.
# The deploy job requires manual approval via GitHub environment: production.
name: Deploy to Azure

on:
  repository_dispatch:
    types: [deploy]   # Fired by Project 1's trigger-deploy job
  workflow_dispatch:
    inputs:
      api_tag:
        description: "Full API image tag (e.g. acr.azurecr.io/agentic-erp-api:abc1234)"
        required: true
        type: string
      frontend_tag:
        description: "Full frontend image tag (e.g. acr.azurecr.io/agentic-erp-frontend:abc1234)"
        required: true
        type: string
      short_sha:
        description: "Short commit SHA (for annotation)"
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────────────────────
  # Deploy job — gated by GitHub environment: production
  # ─────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    environment: production           # Requires manual approval in GitHub
    env:
      API_TAG: ${{ github.event.client_payload.api_tag || inputs.api_tag }}
      FRONTEND_TAG: ${{ github.event.client_payload.frontend_tag || inputs.frontend_tag }}
      SHORT_SHA: ${{ github.event.client_payload.short_sha || inputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate image tags
        run: |
          if [[ -z "$API_TAG" || -z "$FRONTEND_TAG" ]]; then
            echo "::error::No image tags provided. Aborting deploy."
            exit 1
          fi
          echo "Deploying API:      $API_TAG"
          echo "Deploying Frontend: $FRONTEND_TAG"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.RG_NAME }}" \
            --name "${{ secrets.AKS_NAME }}" \
            --overwrite-existing

      - name: Apply Kubernetes base manifests
        run: kubectl apply -k k8s/base/

      - name: Set image tags in Kubernetes
        run: |
          API_TAG=$(echo "${API_TAG}" | tr -d '[:space:]')
          FRONTEND_TAG=$(echo "${FRONTEND_TAG}" | tr -d '[:space:]')
          kubectl set image deployment/api \
            api="${API_TAG}" \
            --namespace default
          kubectl set image deployment/frontend \
            frontend="${FRONTEND_TAG}" \
            --namespace default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api \
            --timeout=120s --namespace default
          kubectl rollout status deployment/frontend \
            --timeout=120s --namespace default

      - name: Annotate deployment
        run: |
          kubectl annotate deployment/api \
            kubernetes.io/change-cause="CI deploy: sha=${SHORT_SHA}" \
            --overwrite --namespace default
          kubectl annotate deployment/frontend \
            kubernetes.io/change-cause="CI deploy: sha=${SHORT_SHA}" \
            --overwrite --namespace default

  # ─────────────────────────────────────────────────────────────
  # Smoke test — runs after deploy
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
        run: bash scripts/smoke-test.sh
